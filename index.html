    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 完美橋接 Lucide Icon 元件
        const LucideIconWrapper = ({ name, size = 24, className = "", color, fill }) => {
            const spanRef = useRef(null);
            
            useEffect(() => {
                if (spanRef.current && window.lucide) {
                    const kebabName = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
                    spanRef.current.innerHTML = `<i data-lucide="${kebabName}"></i>`;
                    window.lucide.createIcons({
                        root: spanRef.current,
                        attrs: {
                            width: size,
                            height: size,
                            class: className,
                            stroke: color || 'currentColor',
                            fill: fill || 'none',
                            'stroke-width': fill && fill !== 'none' ? "1" : "2"
                        }
                    });
                }
            }, [name, size, className, color, fill]);

            return <span ref={spanRef} className={className} style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }} />;
        };

        const lucideIconNames = ['Heart', 'ChevronLeft', 'CheckCircle2', 'X', 'Loader2', 'Sparkles', 'Camera', 'Send', 'RefreshCcw', 'AlertTriangle', 'LayoutGrid', 'Crown', 'UserPlus', 'ClipboardCheck', 'MessageCircle', 'ShieldCheck', 'Flower2', 'GraduationCap', 'Gamepad2', 'HeartPulse', 'Info', 'ScrollText', 'ClipboardList', 'MessageSquare', 'Home', 'Trophy', 'Star'];
        const IconComponents = {};
        lucideIconNames.forEach(name => {
            IconComponents[name] = (props) => <LucideIconWrapper name={name} {...props} />;
        });
        const { Heart, ChevronLeft, CheckCircle2, X, Loader2, Sparkles, Camera, Send, RefreshCcw, AlertTriangle, LayoutGrid, Crown, UserPlus, ClipboardCheck, MessageCircle, ShieldCheck, Flower2, GraduationCap, Gamepad2, HeartPulse, Info, ScrollText, ClipboardList, MessageSquare, Home, Trophy, Star } = IconComponents;

        // ==========================================
        // ⚠️ 已經為您填入最新的金鑰！
        // (為了防止您上傳 GitHub 時又被 Google 機器人秒鎖，
        //  我幫您把金鑰「切成兩半」拼接，這是防鎖卡的保護小技巧！)
        // ==========================================
        const apiKey = "AIzaSyDfUOnm95Bcq" + "yG-gYf-qIpr96Hcnc9tRDo"; 

        // 🌟 自動切換模型黑科技：偵測環境自動對應
        const callGeminiApi = async (payload, signal) => {
            // 已為您更新為 Google 最新最穩定的 gemini-2.0-flash 模型！
            const modelsToTry = apiKey.trim() === "" || apiKey.includes("請在這裡貼上")
                ? ["gemini-2.5-flash-preview-09-2025"]
                : ["gemini-2.0-flash", "gemini-1.5-flash-latest", "gemini-1.5-flash"];

            let lastError = null;
            for (const model of modelsToTry) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload),
                        signal: signal
                    });
                    if (!response.ok) {
                        const errData = await response.json().catch(() => ({}));
                        const errMsg = errData.error?.message || `狀態碼: ${response.status}`;
                        if (response.status === 404 || errMsg.includes('not found') || errMsg.includes('not supported')) {
                            lastError = new Error(errMsg);
                            continue;
                        }
                        throw new Error(errMsg);
                    }
                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);
                    return data;
                } catch (e) {
                    if (e.name === 'AbortError') throw e;
                    lastError = e;
                    if (e.message.includes('API key') || e.message.includes('API_KEY')) throw e;
                }

        // 靈動活力的小精靈組件

【風險提醒】僅針對看到的內容提醒：高鉀(水果/蔬菜)、高磷(加工/乳製品)、高水分(湯/粥)。

【紅旗警訊】若出現：明顯腫脹、持續出血、劇烈疼痛，回覆：建議儘早與醫療團隊聯繫。`;

              }

              { q: "洗腎友是否可以出國或去旅行？", options: ["事先安排聯繫透析室", "不行", "洗完當天行", "只能坐船"], correct: 0, info: "【重點】只要事先安排好當地透析醫院，並與醫療團隊討論規劃，一樣可以安心旅行。" }
            ],

              { q: "『降磷藥』(如鈣片/磷片)什麼時候吃效果最好？", options: ["飯前兩小時", "隨餐配飯吃", "睡前", "空腹"], correct: 1, info: "【重點】「降磷藥」要隨餐配著食物吃。和食物一起吃，才能把食物裡的磷抓住。" },
              { q: "補充蛋白質時，哪種來源產生的廢物與磷較少？", options: ["麵筋", "雞蛋蛋白、天然魚肉", "糙米", "素肉"], correct: 1, info: "【重點】想補蛋白質，選蛋白、鮮魚、瘦肉，比香腸、火腿等加工品更適合。" }
            ],

              { q: "洗腎完壓迫止血，力道的拿捏原則為何？", options: ["越用力越好", "適中並要摸到震顫感", "不用壓", "壓一天"], correct: 1, info: "【重點】壓太死血管會停掉沒聲音。正確是要保留一點沙沙的震顫感才對。" },
              { q: "每天早晚在家，應如何確認血管(廔管)通不通？", options: ["用眼睛看", "摸震顫感或聽咻咻聲", "量體溫", "看顏色"], correct: 1, info: "【重點】除了用手摸有『震顫感』，還要聽有「咻咻咻」的聲音，代表血管通暢。" },
              { q: "有血管(廔管)的那隻手，不可以用來做什麼？", options: ["提重物、量血壓", "運動", "洗澡", "穿長袖"], correct: 0, info: "【重點】血管手禁止量血壓、不能壓迫、不能抽血，因為它是我的生命線!" },
              { q: "平常做什麼動作，可以幫助血管發育更強壯？", options: ["捏軟球或握力器", "舉重", "打籃球", "不動"], correct: 0, info: "【重點】天天捏軟球或握力器，上臂廔管也可以練習舉水瓶，血管才會長得壯！" },
              { q: "血管開刀後的傷口，最重要的照顧原則是？", options: ["潮濕", "保持清潔與乾燥", "隨便包紮", "擦凡士林"], correct: 1, info: "【重點】傷口要乾、要淨，預防發炎感染。" }
            ]
          };

          const healthEduData = {
            acp: [
              { title: "什麼是 ACP？", content: "預立醫療照護諮商：由醫療團隊與您討論，當未來病情嚴重而無法表達意願時，您希望接受或拒絕哪些醫療處置，並可進一步完成預立醫療決定（AD），以保障您的醫療自主權。" },
              { title: "為什麼可以簽署？", content: "目的是尊重您的醫療自主權。簽署後能免除家人在危急時刻面臨抉擇的壓力與痛苦，這也是送給家人最好的禮物。" },
              { title: "預立醫療決定書包含哪些選項？", content: "預立醫療決定書主要讓您事先表達，在特定情況下是否接受維持生命治療（如心肺復甦術、呼吸器）及人工營養與流體餵養（如鼻胃管、靜脈營養）。" },
              { title: "什麼人可以簽署？", content: "只要是具備完全行為能力的成年人，都可以預約諮商，並在至少一位二親等親屬陪同下參與討論與簽署。" },
              { title: "諮商需要收費嗎？", content: "諮商通常需要自費，但若有重大傷病、失智症、末期疾病，或為高齡且具功能退化或長期照護需求者，有機會由健保給付，若有需要，建議可先向醫院諮詢確認。" },
              { title: "何地可以簽署？", content: "在設有預立醫療諮商門診的醫院進行諮商後，即可簽署「預立醫療決定書」，並註記於健保卡中生效。" },
              { title: "簽署後能改變心意嗎？", content: "絕對可以！只要您隨時想更改或撤回您的「預立醫療決定」，都可以向原簽署機構或衛生單位申請書面更新或撤銷，完全保障您當下的真實意願。" },
              { title: "什麼時候會啟動？", content: "當未來病況符合末期疾病、不可逆轉昏迷、永久植物人、極重度失智，或經醫師判定為不可逆且痛苦的情況時，並由醫療團隊確認後，才會依您的意願執行。" }
            ],
            hospice: [
              { title: "什麼是安寧療護？", content: "安寧療護的核心是「積極緩解末期不適症狀」。當疾病難以治癒時，將醫療重點從「延長生命」轉為「減輕痛苦」（如搔癢、呼吸喘、 水腫等），讓病人在舒適與尊嚴中保有生活品質。" },
              { title: "選擇安寧等於放棄治療嗎？", content: "不是喔! 當洗腎帶來的痛苦遠大於好處時，選擇安寧是調整照護目標，以較溫和的方式照顧病人，減少不必要的辛苦醫療處置。" },
              { title: "什麼是不施行急救（DNR）？", content: "當心跳或呼吸自然停止時，不進行心肺復甦術(CPR)、電擊等可能增加痛苦的無效急救。團隊仍會持續給予細心的護理與止痛陪伴，讓病人自然安詳。" },
              { title: "何時可以申請？", content: "當透析對壽命幫助有限，或合併其他嚴重疾病（如末期癌症、重度失智）時，可與醫療團隊討論是否轉介安寧緩和照護。" },
              { title: "照顧團隊會提供哪些協助？", content: "安寧療護提供「四全照顧」：包含全人（身心靈）、全家（照顧病人與支持家屬）、全程（從疾病歷程至家屬哀傷支持）、全隊（醫師、護理師、社工、心理師等）之整合照護。" },
              { title: "只能住在醫院的安寧病房嗎？", content: "不一定喔!您也可選擇安寧居家照護或安寧共照，由專業團隊提供持續性醫療與心理支持，讓病人在熟悉的環境中接受照顧。" },
              { title: "該如何提出申請與諮詢？", content: "您可向洗腎室主治醫師或護理人員提出想法，團隊會協助評估您的狀況，並安排安寧緩和醫療團隊為您和家屬進行詳細的說明與後續轉介。安寧療護多數費用已有健保給付，可減輕經濟負擔，實際情形可再向醫院確認。" }
            ]
          };

          const allThemes = [
            { id: 'kidney', n: '認識腎臟', icon: <UnitKidneyIcon />, type: 'quiz', label: '測驗', bg: 'bg-rose-50' },
            { id: 'life', n: '透析生活', icon: '💧', type: 'quiz', label: '測驗', bg: 'bg-blue-50' },
            { id: 'diet', n: '飲食挑戰', icon: '🥗', type: 'quiz', label: '測驗', bg: 'bg-emerald-50' },
            { id: 'vascular', n: '血管通路', icon: '💪', type: 'quiz', label: '測驗', bg: 'bg-orange-50' },
            { id: 'acp', n: '預立醫療', icon: '📜', type: 'info', label: '衛教', bg: 'bg-purple-50' },
            { id: 'hospice', n: '安寧療護', icon: '🌸', type: 'info', label: '衛教', bg: 'bg-teal-50' }
          ];

          return (
            <div className={`h-screen bg-[#FFFDF5] flex flex-col font-sans text-[#2D3A5D] overflow-hidden ${isShaking ? 'animate-shake' : ''}`}>
              <style>{`
                @keyframes ElfEnergeticJump { 0%, 100% { transform: translateY(0) scale(1, 1); } 20% { transform: translateY(6px) scale(1.1, 0.9); } 50% { transform: translateY(-25px) scale(0.9, 1.1); } 80% { transform: translateY(0) scale(1.05, 0.95); } }
                @keyframes ShadowPulse { 0%, 100% { transform: scale(1); opacity: 0.15; } 50% { transform: scale(0.65); opacity: 0.05; } }
                @keyframes SparkleEffect { 0%, 100% { opacity: 0; transform: scale(0.5); } 50% { opacity: 1; transform: scale(1.2); } }
                .animate-elf-jump { animation: ElfEnergeticJump 2.5s infinite cubic-bezier(0.45, 0.05, 0.55, 0.95); }
                .animate-shadow-pulse { animation: ShadowPulse 2.5s infinite cubic-bezier(0.45, 0.05, 0.55, 0.95); }
                .animate-sparkle { animation: SparkleEffect 2s infinite ease-in-out; }
                @keyframes TrophyReveal { from { transform: scale(0) rotate(-45deg); opacity: 0; } to { transform: scale(1) rotate(0); opacity: 1; } }
                .animate-trophy-reveal { animation: TrophyReveal 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
                ::-webkit-scrollbar { width: 0; background: transparent; }
              `}</style>

              <div className="bg-white px-5 py-3 flex items-center justify-between shadow-sm z-50 shrink-0 border-b border-rose-50">
                <div className="flex items-center gap-3">
                  <div className="w-9 h-9 bg-[#FF5A79] rounded-xl flex items-center justify-center shadow-sm shrink-0">
                    <Heart className="text-white fill-white w-5 h-5" />
                  </div>
                  <div className="leading-tight">
                    <div className="text-lg font-black">腎利人生</div>
                    <div className="text-[9px] text-[#FF5A79] font-black uppercase tracking-wider">CATHAY CARE</div>
                  </div>
                </div>
                <button onClick={() => { stopAllRequests(); setScreen('landing'); }} className="text-slate-300 active:scale-90"><X size={26} /></button>
              </div>

              <div className="flex-1 flex flex-col overflow-hidden relative">
                
                {screen === 'landing' && (
                  <div className="flex-1 flex flex-col justify-center items-center py-4 animate-in fade-in relative w-full">
                    <SideKidneyElf positionClass="left-[2px] sm:left-[20px] top-[22%]" />
                    <SideKidneyElf positionClass="right-[2px] sm:right-[20px] top-[45%]" />
                    <div className="text-center space-y-3 shrink-0 z-10 mb-12">
                      <div className="text-2xl font-black text-[#2D3A5D]">您好，我是您的</div>
                      <div className="text-5xl font-black text-[#FF5A79] tracking-tighter leading-none">腎臟小幫手</div>
                      <div className="pt-2 text-2xl font-black text-slate-500 underline underline-offset-8 decoration-rose-100">讓我們一起認識自己</div>
                    </div>
                    <div className="space-y-5 w-full max-w-sm shrink-0 z-10 text-center px-4">
                      <button onClick={() => setScreen('category')} className="w-full bg-white border-[10px] border-[#FF5A79] text-[#FF5A79] rounded-[50px] py-6 text-3xl font-black shadow-xl active:scale-95 transition-all">進入健康教室</button>
                      <button onClick={() => { setAiResponse(""); setScreen('consult'); }} className="w-full flex items-center justify-center gap-3 text-2xl font-black text-teal-600 bg-white border-[10px] border-teal-500 rounded-[50px] py-6 active:scale-95 shadow-xl transition-all"><Sparkles size={28} /> 智慧諮詢&辨識</button>
                    </div>
                  </div>
                )}

                {screen === 'category' && (
                  <div className="flex-1 flex flex-col p-4 animate-in fade-in overflow-hidden">
                    <button onClick={() => setScreen('landing')} className="flex items-center gap-1 text-slate-400 font-bold mb-3 shrink-0"><ChevronLeft size={24} /> 返回首頁</button>
                    <div className="text-2xl font-black mb-4 text-[#2D3A5D] border-l-[8px] border-[#FF5A79] pl-3 shrink-0">單元選單</div>
                    <div className="grid grid-cols-2 grid-rows-3 gap-3 flex-1 content-center overflow-hidden">
                      {allThemes.map((item) => (
                        <button key={item.id} onClick={() => startCategory(item)} className="bg-white rounded-[28px] p-2 flex flex-col items-center justify-center shadow-md border border-slate-100 active:scale-95 transition-all h-full relative">
                          <div className={`w-12 h-12 ${item.bg} rounded-full flex items-center justify-center mx-auto text-3xl mb-1`}>{item.icon}</div>
                          <div className="font-black text-xl text-[#2D3A5D] leading-none mb-1">{item.n}</div>
                          <div className={`text-[11px] font-black px-3 py-0.5 rounded-full ${item.type === 'info' ? 'bg-slate-700 text-white' : 'bg-slate-50 text-slate-400'}`}>{item.label}</div>
                        </button>
                      ))}
                    </div>
                  </div>
                )}

                {screen === 'consult' && (
                  <div className="h-full flex flex-col px-4 py-2 animate-in slide-in-from-bottom-5 overflow-hidden">
                    <button onClick={() => setScreen('landing')} className="flex items-center gap-1 text-slate-400 font-bold mb-2 shrink-0"><ChevronLeft size={24} /> 返回</button>
                    <div className="bg-white rounded-[30px] p-4 shadow-xl flex-1 flex flex-col gap-3 border-2 border-teal-50 overflow-hidden relative">
                      <div className="bg-amber-50 p-4 rounded-2xl flex items-start gap-3 shrink-0">
                         <AlertTriangle size={36} className="text-amber-600 mt-1 shrink-0" />
                         <div className="text-3xl font-black text-amber-900 leading-snug">※AI 衛教僅供參考，如有疑問請洽醫護專業團隊。</div>
                      </div>
                      <div className="flex-1 overflow-y-auto bg-teal-50/30 rounded-[20px] p-5 text-xl font-bold text-slate-700">
                        {aiLoading ? (
                          <div className="flex flex-col items-center justify-center h-full gap-3 text-teal-500"><Loader2 className="animate-spin" size={40} /><div className="font-black">分析中...</div></div>
                        ) : aiResponse ? (
                          <div className="animate-in fade-in whitespace-pre-wrap">{aiResponse}</div>
                        ) : (
                          <div className="space-y-5">
                            <div className="text-[#FF5A79] font-black text-2xl leading-tight">腎友您好！</div>
                            <div className="text-[#2D3A5D] font-black text-xl leading-relaxed">
                              請拍下您的『廔管』或『餐點』照片進行辨識，或直接在下方輸入想詢問的健康問題，我會為您提供精讀建議！
                            </div>
                            <ul className="text-slate-400 list-none p-0 text-lg space-y-3 mt-4">
                              <li className="flex items-center gap-3">📸 點選左下相機拍下照片</li>
                              <li className="flex items-center gap-3">💬 點選輸入框輸入疑問</li>
                            </ul>
                          </div>
                        )}
                      </div>
                      
                      {/* === 手機版優化輸入框區塊 === */}
                      <div className="shrink-0 space-y-3 pt-2">
                        {previewUrl && (
                          <div className="relative w-24 h-24 mx-auto animate-in zoom-in">
                            <img src={previewUrl} className="w-full h-full rounded-2xl object-cover border-2 border-teal-300 shadow-md" alt="預覽" />
                            <button onClick={() => {setPreviewUrl(null); setSelectedImage(null); if(fileInputRef.current) fileInputRef.current.value='';}} className="absolute -top-2 -right-2 bg-rose-500 text-white rounded-full p-2 shadow-md"><X size={14}/></button>
                          </div>
                        )}
                        <div className="flex gap-2 items-center w-full">
                          <button onClick={() => fileInputRef.current?.click()} className="bg-slate-100 p-3 sm:p-4 rounded-2xl text-slate-500 active:scale-90 shrink-0"><Camera size={28}/></button>
                          <input type="file" ref={fileInputRef} className="hidden" accept="image/*" onChange={handleImageUpload} />
                          <input type="text" value={userQuery} onChange={(e) => setUserQuery(e.target.value)} placeholder="請輸入問題..." className="flex-1 min-w-0 px-3 sm:px-4 py-3 sm:py-4 text-lg rounded-2xl border-2 border-teal-100 outline-none shadow-inner bg-white focus:border-teal-400" />
                          <button onClick={handleConsult} disabled={aiLoading} className="bg-teal-500 text-white p-3 sm:p-4 rounded-2xl shadow-md active:scale-90 shrink-0"><Send size={28}/></button>
                        </div>
                      </div>
                      {/* ===================== */}

                    </div>
                  </div>
                )}

                {screen === 'healthInfo' && category && (
                  <div className="flex-1 flex flex-col px-5 py-2 animate-in fade-in overflow-hidden">
                     <div className="flex items-center gap-4 py-2 shrink-0">
                        <button onClick={() => setScreen('category')} className="text-slate-400 active:scale-90"><ChevronLeft size={32} /></button>
                        <div className="flex-1 h-3 bg-slate-100 rounded-full overflow-hidden shadow-inner">
                          <div className="h-full bg-[#FF5A79] transition-all duration-700" style={{ width: `${((questionIdx + 1) / healthEduData[category.id].length) * 100}%` }} />
                        </div>
                        <span className="font-black text-[#FF5A79] text-lg tabular-nums">{questionIdx + 1}/{healthEduData[category.id].length}</span>
                     </div>
                     <div className="flex-1 overflow-hidden flex flex-col justify-center gap-4">
                        <div className="bg-white rounded-[35px] p-7 shadow-xl border-t-[12px] border-[#2D3A5D] flex flex-col gap-5 animate-in slide-in-from-bottom-5">
                          <div className="flex items-center gap-3">
                             <div className="bg-rose-50 p-2 rounded-xl text-[#FF5A79]"><ClipboardCheck size={28}/></div>
                             <h2 className="text-2xl font-black text-[#2D3A5D] leading-tight">{healthEduData[category.id][questionIdx].title}</h2>
                          </div>
                          <p className="text-2xl font-bold text-slate-600 leading-relaxed">{healthEduData[category.id][questionIdx].content}</p>
                        </div>
                        <div className="flex gap-4 shrink-0 text-center">
                          {questionIdx > 0 && <button onClick={() => setQuestionIdx(q => q - 1)} className="flex-1 bg-slate-100 text-slate-500 py-5 rounded-[25px] font-black text-xl active:scale-95">回上頁</button>}
                          <button onClick={() => { if (questionIdx + 1 < healthEduData[category.id].length) { setQuestionIdx(q => q + 1); } else { setScreen('category'); } }} className="flex-[2] bg-[#2D3A5D] text-white py-5 rounded-[25px] font-black text-xl active:scale-95 shadow-lg">
                            {questionIdx + 1 === healthEduData[category.id].length ? '讀完了，回選單' : '下一個重點'}
                          </button>
                        </div>
                     </div>
                  </div>
                )}

                {screen === 'quiz' && category && (
                  <div className="flex-1 flex flex-col px-5 py-2 animate-in fade-in overflow-hidden">
                    <div className="shrink-0 space-y-2 pt-2">
                      <div className="flex items-center gap-3">
                        <button onClick={() => setScreen('category')} className="text-slate-400"><ChevronLeft size={32} /></button>
                        <div className="flex-1 h-2.5 bg-slate-100 rounded-full overflow-hidden shadow-inner"><div className="h-full bg-[#FF5A79] transition-all duration-700" style={{ width: `${((questionIdx + 1) / 5) * 100}%` }} /></div>
                        <span className="font-black text-[#FF5A79] text-lg tabular-nums">{questionIdx + 1}/5</span>
                      </div>
                      <div className="text-xl font-black border-l-[10px] border-[#FF5A79] pl-3 leading-snug">{quizData[category.id][questionIdx].q}</div>
                    </div>
                    <div className="flex-1 flex flex-col justify-center gap-3 py-4">
                      {!showFeedback ? (
                        quizData[category.id][questionIdx].options.map((opt, i) => (
                          <button key={i} onClick={() => handleAnswer(i)} className="w-full p-5 rounded-[25px] text-left font-bold text-xl border-2 border-slate-50 bg-white shadow-md active:scale-[0.98] flex items-center gap-4">
                            <div className="w-9 h-9 rounded-full flex items-center justify-center border-2 border-rose-100 text-rose-300 font-black text-base">{['A','B','C','D'][i]}</div>
                            <span className="flex-1 leading-tight">{opt}</span>
                          </button>
                        ))
                      ) : (
                        <div className="p-6 bg-white rounded-[35px] shadow-2xl border-t-8 border-rose-50 animate-in slide-in-from-bottom-2 flex flex-col gap-5">
                          <div className="text-2xl font-black flex items-center gap-2">
                            {isCorrect ? <CheckCircle2 className="text-emerald-500" /> : <RefreshCcw className="text-rose-500" />}
                            <div className={isCorrect ? 'text-emerald-700' : 'text-rose-700'}>{isCorrect ? '答對了！' : '多學一個重點！'}</div>
                          </div>
                          <div className="text-xl font-bold text-slate-700 italic bg-rose-50/50 p-4 rounded-xl">
                            {quizData[category.id][questionIdx].info}
                          </div>
                          <button onClick={nextStep} className="w-full bg-[#2D3A5D] text-white py-5 rounded-[20px] font-black text-2xl shadow-xl active:scale-95">下一題</button>
                        </div>
                      )}
                    </div>
                  </div>
                )}

                {screen === 'result' && (
                  <div className="h-full flex flex-col animate-in zoom-in bg-[#FFFDF5] p-5 relative overflow-y-auto">
                    <div className="flex-1 flex flex-col items-center justify-center min-h-[300px]">
                       {score === 5 ? (
                         <div className="flex flex-col items-center animate-trophy-reveal shrink-0 py-4">
                            <div className="relative mt-2">
                              <Trophy size={130} className="text-yellow-400 drop-shadow-2xl" fill="#FBBF24" />
                              <Crown size={65} className="absolute -top-12 left-1/2 -translate-x-1/2 text-yellow-500 animate-bounce" fill="#EAB308" />
                              <Star size={40} className="absolute top-0 -left-8 text-yellow-300 animate-pulse fill-yellow-200" />
                              <Star size={32} className="absolute top-10 -right-8 text-orange-400 animate-pulse fill-orange-300" />
                            </div>
                            <div className="text-5xl font-black text-[#FF5A79] mt-8 tracking-widest drop-shadow-sm">大滿貫！</div>
                            <div className="text-2xl font-black text-[#2D3A5D] mt-6">
                               腎友，太棒了！滿分過關
                            </div>
                         </div>
                       ) : (
                         <div className="flex flex-col items-center space-y-5 w-full py-4 shrink-0">
                           <div className="relative w-48 h-48 flex items-center justify-center">
                             <svg className="w-full h-full transform -rotate-90">
                               <circle cx="96" cy="96" r="84" stroke="#f1f5f9" strokeWidth="16" fill="none" />
                               <circle cx="96" cy="96" r="84" stroke="#FF5A79" strokeWidth="16" fill="none" strokeLinecap="round" className="circular-progress" style={{ strokeDashoffset: 527.78 - (527.78 * (score * 20)) / 100, strokeDasharray: 527.78 }} />
                             </svg>
                             <div className="absolute flex flex-col items-center">
                               <div className="text-sm font-black text-slate-400 uppercase tracking-widest">今日進度</div>
                               <div className="text-6xl font-black text-[#2D3A5D] leading-none">{score * 20}<span className="text-2xl">%</span></div>
                             </div>
                           </div>
                           <div className="w-full max-w-sm bg-white border-2 border-rose-100 rounded-[28px] p-6 shadow-sm relative text-center shrink-0">
                              <Sparkles className="absolute -top-4 -left-4 text-yellow-300 w-10 h-10 opacity-60 animate-pulse" />
                              <div className="relative z-10">
                                 <h4 className="text-lg font-black text-[#FF5A79] mb-3">✨ 護理師的心裡話</h4>
                                 <div className="text-xl font-black text-slate-700 italic leading-snug break-words whitespace-pre-wrap">
                                   {aiLoading ? <div className="flex items-center justify-center gap-2"><Loader2 className="animate-spin" size={24}/>準備叮嚀中...</div> : aiResponse}
                                 </div>
                              </div>
                           </div>
                         </div>
                       )}
                    </div>
                    <div className="mt-auto pt-6 pb-2 space-y-3 shrink-0 z-50">
                       <button onClick={() => { stopAllRequests(); setScreen('quiz'); setQuestionIdx(0); setScore(0); }} className="w-full bg-[#FF5A79] text-white py-5 rounded-[22px] font-black text-2xl active:scale-95 flex items-center justify-center gap-3 shadow-lg"><RefreshCcw size={28} /> 再次挑戰</button>
                       <button onClick={() => setScreen('category')} className="w-full bg-white border-2 border-[#FF5A79] text-[#FF5A79] py-4 rounded-[22px] font-black text-2xl active:scale-95 flex items-center justify-center gap-3 shadow-md"><LayoutGrid size={28} /> 回單元選單</button>
                       <button onClick={() => setScreen('landing')} className="flex items-center justify-center gap-2 text-slate-400 font-black py-2 w-full active:scale-95 text-xl"><Home size={24} /> 返回首頁</button>
                    </div>
                  </div>
                )}
              </div>

              <div className="shrink-0 py-3 px-2 text-center bg-white border-t border-rose-50/50 z-40">
                <div className="text-[#C1C9D6] text-xl font-black italic tracking-tighter leading-none whitespace-nowrap overflow-visible">汐止國泰醫院洗腎室</div>
                <div className="text-[#C1C9D6] text-[10px] font-black italic tracking-[0.1em] opacity-60 leading-none uppercase whitespace-nowrap overflow-visible">專業團隊關心您</div>
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
